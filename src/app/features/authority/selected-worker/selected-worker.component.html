<div class="fixed inset-0 z-50 flex items-center justify-center" *ngIf="issue as activeIssue">
  <!-- Backdrop -->
  <div
    class="absolute inset-0 bg-black/60 backdrop-blur-[2px]"
    (click)="onBackdropClick()"
  ></div>

  <!-- Popover Card -->
  <div
    class="relative z-[1] w-full max-w-[340px] rounded-2xl border border-brand-border bg-brand-surface p-5 shadow-[0_20px_50px_rgba(3,8,19,0.8)]"
  >
    <!-- Header -->
    <header class="mb-4 flex items-center justify-between border-b border-brand-border pb-3">
      <span class="text-xs font-bold uppercase tracking-wider text-brand-muted">{{ 'selectWorker' | translate }}</span>
      <button
        type="button"
        class="cursor-pointer bg-transparent border-0 text-brand-muted hover:text-brand-text-primary text-base transition-colors"
        (click)="close.emit()"
        aria-label="Close"
      >
        <fa-icon [icon]="['far', 'xmark']"></fa-icon>
      </button>
    </header>

    <!-- Workers List -->
    <div class="flex flex-col gap-2.5 max-h-[220px] overflow-y-auto pr-0.5">
      <div
        *ngFor="let worker of workers"
        class="flex items-center justify-between gap-3 rounded-xl border border-brand-border/40 bg-brand-bg/30 p-2.5"
      >
        <!-- Left Side: Initials & Info -->
        <div class="flex items-center gap-2.5 min-w-0">
          <div
            class="flex size-8 shrink-0 items-center justify-center rounded-full bg-slate-800 text-[0.7rem] font-bold text-brand-muted"
          >
            {{ worker.id }}
          </div>
          <div class="flex flex-col min-w-0 text-left">
            <span class="text-xs font-semibold text-brand-text-primary truncate">{{ worker.name }}</span>
            <span class="text-[0.65rem] text-brand-muted truncate mt-0.5">{{ worker.role | translate }}</span>
          </div>
        </div>

        <!-- Right Side: Status/Action -->
        <div class="flex items-center gap-1.5 shrink-0">
          <span class="size-1.5 rounded-full"
            [class.bg-green-400]="worker.status === 'available'"
            [class.bg-orange-400]="worker.status === 'busy'"
            [class.bg-gray-400]="worker.status === 'offline'"
          ></span>
          
          <button
            *ngIf="worker.status === 'available'"
            type="button"
            class="cursor-pointer rounded bg-brand-primary px-2.5 py-1 text-[0.65rem] font-bold uppercase text-white hover:bg-brand-primary-hover transition-colors"
            (click)="selectedWorkerId = worker.id; onAssign()"
          >
            {{ 'assign' | translate }}
          </button>
          <span
            *ngIf="worker.status !== 'available'"
            class="text-[0.65rem] font-bold uppercase text-orange-400"
          >
            {{ (worker.status === 'busy' ? 'busy' : 'offline') | translate }}
          </span>
        </div>
      </div>
    </div>

    <!-- Custom ID Input (for testing / manual assign) -->
    <div class="mt-4 border-t border-brand-border pt-4">
      <label class="text-[10px] text-brand-muted uppercase tracking-wider font-semibold block mb-2">Or enter Worker ID manually:</label>
      <div class="flex gap-2">
        <input type="text" [(ngModel)]="customWorkerId" placeholder="Paste Worker UUID here..."
               class="flex-1 bg-brand-bg border border-brand-border rounded-lg text-xs px-3 h-[32px] text-brand-text-primary focus:outline-none focus:border-brand-primary transition-all">
        <button type="button" [disabled]="!customWorkerId" (click)="onAssignCustom()"
                class="bg-brand-primary text-white text-[11px] font-bold px-3 py-1 rounded-lg hover:bg-brand-primary-hover transition-colors disabled:opacity-50">
          Assign
        </button>
      </div>
    </div>

    <!-- Footer -->
    <div class="mt-4 border-t border-brand-border pt-3 text-center">
      <a
        href="#"
        (click)="$event.preventDefault(); close.emit()"
        class="text-[0.7rem] font-bold uppercase tracking-wider text-brand-muted hover:text-brand-primary transition-colors no-underline"
      >
        {{ 'viewAllWorkers' | translate }} &rarr;
      </a>
    </div>
  </div>
</div>
